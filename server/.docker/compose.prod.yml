# Production override — use with: docker compose -f compose.yml -f compose.prod.yml up
#
# Differences from base:
#   - coturn uses network_mode: host (direct UDP, better performance)
#   - no port mapping needed (host networking exposes all ports)
#
# You MUST also update coturn/turnserver.conf for production:
#   - Set external-ip=<YOUR_PUBLIC_IP>
#   - Widen relay range: min-port=49152 / max-port=65535
#   - Change user=saloon:<STRONG_PASSWORD>
#
# And set matching env vars in .env:
#   SALOON_COTURN_HOST=127.0.0.1   (or your public IP)
#   SALOON_TURN_CREDENTIAL=<STRONG_PASSWORD>
#   SALOON_AUTH_SECRET=<RANDOM_SECRET>
#   SALOON_TRUSTED_PROXY=true      (if behind nginx/Caddy)

services:
  coturn:
    network_mode: host
