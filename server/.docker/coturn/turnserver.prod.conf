# coturn TURN/STUN server configuration — PRODUCTION
# See https://github.com/coturn/coturn/wiki/turnserver for all options
#
# BEFORE DEPLOYING, update:
#   - static-auth-secret  → strong random value (match SALOON_TURN_SECRET in .env)
#   - external-ip         → your server's public IP
#   - cert / pkey         → paths to your TLS certificate and key

# ── Network ────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# Uncomment and set your server's public IP:
# external-ip=YOUR_PUBLIC_IP

# ── TLS ────────────────────────────────────────────────────────────────────
# Uncomment and set paths to your TLS certificate and private key:
# cert=/etc/coturn/certs/turn.pem
# pkey=/etc/coturn/certs/turn.key

# ── Realm ──────────────────────────────────────────────────────────────────
realm=saloon

# ── Credentials ────────────────────────────────────────────────────────────
# Ephemeral (time-limited) credentials via HMAC shared secret.
# Must match SALOON_TURN_SECRET in .env — use a strong random value!
use-auth-secret
static-auth-secret=CHANGE_ME_TO_A_STRONG_RANDOM_SECRET

# ── Security ──────────────────────────────────────────────────────────────
# Block relay to ALL private/loopback/reserved ranges (prevents SSRF)
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Expire nonces after 600s to limit replay attacks
stale-nonce=600

# Disable the telnet CLI admin interface
no-cli

# ── Resource limits ───────────────────────────────────────────────────────
total-quota=100
max-bps=300000

# ── Relay ─────────────────────────────────────────────────────────────────
min-port=49152
max-port=65535

# ── Logging ───────────────────────────────────────────────────────────────
no-log

# ── Performance ───────────────────────────────────────────────────────────
fingerprint
