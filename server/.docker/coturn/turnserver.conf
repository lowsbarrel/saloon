# coturn TURN/STUN server configuration for Saloon
# See https://github.com/coturn/coturn/wiki/turnserver for all options

# ── Network ────────────────────────────────────────────────────────────────
listening-port=3478
# tls-listening-port=5349

# ── Realm ──────────────────────────────────────────────────────────────────
realm=saloon

# ── Credentials (static — matches SALOON_TURN_USERNAME / SALOON_TURN_CREDENTIAL)
# Format: username:password
user=saloon:saloon-secret

# ── Security ──────────────────────────────────────────────────────────────
# Long-term credential mechanism (required for WebRTC)
lt-cred-mech

# Prevent relay to private/loopback ranges (avoid being an open relay)
# NOTE: For local dev, Docker networking uses 172.x. Comment out the
# private ranges below if relay doesn't work locally. Uncomment ALL
# of them for production deployments.
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
# denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
# denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
# denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# ── Relay ─────────────────────────────────────────────────────────────────
# Relay port range — keep small for local dev (mapped in compose.yml).
# For production with network_mode: host, use 49152-65535.
min-port=49152
max-port=49252

# ── Logging ───────────────────────────────────────────────────────────────
# Suppress file logging; only stdout (visible via docker logs)
no-log

# ── Performance ───────────────────────────────────────────────────────────
# Fingerprint for STUN messages
fingerprint
