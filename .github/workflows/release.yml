name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # ── Server: Docker → GHCR ───────────────────────────────────────────────
  server-docker:
    name: Server — Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: server
          file: server/.docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── App: Tauri builds for macOS / Linux / Windows ────────────────────────
  tauri-build:
    name: App — Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            runner: macos-latest
            target: aarch64-apple-darwin
          - name: macOS (Intel)
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: Linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install JS dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build Tauri app
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tauri-${{ matrix.target }}
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz.sig
            app/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            app/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            app/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            app/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig
            app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig
            app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip.sig
          if-no-files-found: ignore

  # ── GitHub Release with all artifacts ────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [server-docker, tauri-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate updater manifest (latest.json)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"

          # Collect platform signatures
          read_sig() { cat "$1" 2>/dev/null || echo ""; }

          DARWIN_AARCH64_SIG=$(read_sig artifacts/*aarch64-apple-darwin*.tar.gz.sig)
          DARWIN_X86_SIG=$(read_sig artifacts/*x86_64-apple-darwin*.tar.gz.sig)
          LINUX_SIG=$(read_sig artifacts/*.AppImage.tar.gz.sig)
          WINDOWS_NSIS_SIG=$(read_sig artifacts/*.nsis.zip.sig)

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE}/Saloon_${VERSION}_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X86_SIG}",
                "url": "${BASE}/Saloon_${VERSION}_x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE}/Saloon_${VERSION}_amd64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_NSIS_SIG}",
                "url": "${BASE}/Saloon_${VERSION}_x64-setup.nsis.zip"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.tar.gz
            artifacts/**/*.AppImage.tar.gz.sig
            artifacts/**/*.exe
            artifacts/**/*.nsis.zip
            artifacts/**/*.nsis.zip.sig
            artifacts/**/*.msi
            artifacts/**/*.msi.zip
            artifacts/**/*.msi.zip.sig
            latest.json
